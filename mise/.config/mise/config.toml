[settings]
idiomatic_version_file_enable_tools = ["python"]

[tools]
bun = "latest"
java = "21"
node = "24"
pnpm = "latest"
go = "latest"
lua = "latest"
rust = "stable"
uv = "latest"
ruby = "latest"
pipx = "latest"
"github:aurokin/clip-remote-sync" = { version = "latest", asset_pattern = "crs", bin = "crs" }
"github:aurokin/agentscan" = "latest"
"github:steipete/goplaces" = "latest"

# Node CLIs
"npm:opencode-ai" = "latest"
"npm:@fsouza/prettierd" = "latest"
"npm:@vue/typescript-plugin" = "latest"
"npm:typescript-language-server" = "latest"
"npm:typescript" = "latest"
"npm:@google/gemini-cli" = "latest"
"npm:@github/copilot" = "latest"
"npm:skills" = "latest"
"npm:@mariozechner/pi-coding-agent" = "latest"
"npm:agent-browser" = "latest"

# Claude Code is managed separately. The current upstream CLI ships native
# install/update flows (`claude install`, `claude update`) rather than staying
# fully self-contained as a plain npm tool under mise.

# Python CLIs
"pipx:basedpyright" = "latest"
"pipx:beautysh" = "latest"
"pipx:httpie" = "latest"
"pipx:pytest" = { version = "latest", uvx_args = "--with pytest-cov" }
"pipx:ranger-fm" = "latest"
"pipx:ruff" = "latest"
python = "latest"

# Ruby CLIs
"gem:cocoapods" = "latest"
"gem:fastlane" = "latest"
