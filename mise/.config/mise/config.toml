[settings]
idiomatic_version_file_enable_tools = ["python"]

[tools]
bun = "latest"
java = "21"
node = "24"
"npm:pnpm" = "latest"
go = "latest"
lua = "latest"
rust = "stable"
uv = "latest"
ruby = "latest"
pipx = "latest"
gcloud = "latest"
awscli = "latest"
"github:aurokin/clip-remote-sync" = { version = "latest", asset_pattern = "crs", bin = "crs" }
"github:aurokin/agentscan" = "latest"
# Pinned: mise's minimum_release_age default hides fresh releases from "latest";
# bump the pin when cutting a new trunkyard release.
"github:aurokin/trunkyard" = { version = "v0.1.0", asset_pattern = "trunkyard.tar.gz", bin_path = "trunkyard/bin" }
# Pinned (same minimum_release_age reason as trunkyard); v0.7.0 carries the
# AUR-702 composable-sources contract the tprompt stow package requires.
"github:aurokin/tprompt" = "v0.7.0"
"github:steipete/goplaces" = "latest"
"github:steipete/gogcli" = { version = "latest", bin = "gog" }
"github:steipete/imsg" = { version = "latest", os = ["macos"] }
"go:github.com/xdevplatform/xurl" = "latest"

# Node CLIs
"npm:opencode-ai" = "latest"
"npm:@fsouza/prettierd" = "latest"
"npm:@vue/typescript-plugin" = "latest"
"npm:typescript-language-server" = "latest"
"npm:typescript" = "latest"
"npm:@google/gemini-cli" = "latest"
"npm:@github/copilot" = "latest"
"npm:@googleworkspace/cli" = "latest"
"npm:skills" = "latest"
# Pinned (same minimum_release_age reason as trunkyard); bump the pin when
# cutting a new diffwarden release. koopa opts out via MISE_DISABLE_TOOLS
# (hosts/koopa.env.zsh) to keep its pnpm-linked dev build first on PATH.
"npm:diffwarden" = "0.5.0"
"npm:@earendil-works/pi-coding-agent" = "latest"
"npm:agent-browser" = "latest"
"npm:browse" = "latest"
"npm:portless" = "latest"
"npm:hunkdiff" = "latest"
"npm:vercel" = "latest"

# Claude Code is managed separately. The current upstream CLI ships native
# install/update flows (`claude install`, `claude update`) rather than staying
# fully self-contained as a plain npm tool under mise.

# Python CLIs
"pipx:basedpyright" = "latest"
"pipx:beautysh" = "latest"
"pipx:httpie" = "latest"
"pipx:pytest" = { version = "latest", uvx_args = "--with pytest-cov" }
"pipx:ranger-fm" = "latest"
"pipx:ruff" = "latest"
"pipx:youtube-transcript-api" = "latest"
"pipx:antoniorodr/memo" = { version = "latest", os = ["macos"] }
"pipx:jwmoss/notesctl" = { version = "latest", os = ["macos"] }
python = "latest"

# Ruby CLIs
"gem:cocoapods" = "latest"
"gem:fastlane" = "latest"
"github:aurokin/atlassian-cli" = "v0.1.3"
