# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'janoamaral/tokyo-night-tmux'
# Disabled during the agentscan macOS panic investigation. The saved tmux state
# contains agentscan daemon panes, so keep restore/autosave inert until resolved.
# set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @tokyo-night-tmux_window_id_style none 
set -g @tokyo-night-tmux_pane_id_style hide
set -g @tokyo-night-tmux_zoom_id_style hide 
set -g @tokyo-night-tmux_window_tidy_icons 0
set -g @tokyo-night-tmux_show_battery_widget 0
set -g @tokyo-night-tmux_show_datetime 0
set -g @tokyo-night-tmux_show_git 0
set -g @tokyo-night-tmux_show_music 0
set -g @tokyo-night-tmux_show_netspeed 0
set -g @tokyo-night-tmux_show_path 0
set -g @tokyo-night-tmux_show_wbg 0

# set -g @continuum-restore 'on'
# set -g @continuum-save-interval '5'

# set -g @plugin 'fabioluciano/tmux-tokyo-night'
# set -g @theme_variation 'night'

set -g base-index 1
setw -g pane-base-index 1

set -g default-command /bin/zsh

set -g default-terminal "tmux-256color"

# Truecolor + extended keys for the outer terminal. Ghostty/Alacritty/WezTerm
# all report TERM=xterm-256color and support both.
#   RGB     - 24-bit color (replaces the old terminal-overrides ":RGB" hack)
#   extkeys - lets tmux request CSI-u extended keys from the terminal, so combos
#             with no legacy encoding (Ctrl+., Shift+Enter, ...) can travel
#             through tmux into TUIs running inside it
set -as terminal-features "xterm*:RGB:extkeys"

# always: forward extended keys even to apps that don't enable tmux's CSI-u mode
# (TUIs speaking the Kitty keyboard protocol never do, since tmux can't proxy it).
set -s extended-keys always
set -s extended-keys-format csi-u

set -g history-limit 10000

# Mouse support: wheel scrollback, click-to-focus, drag-to-resize/select.
# Hold Shift while dragging to fall back to the terminal's native selection.
set -g mouse on

set-option -g detach-on-destroy off

bind-key t display-popup -E -w 50% -h 50% "~/.zshrc.d/scripts/twigsmux.sh"
bind-key y display-popup -E -w 50% -h 50% -d "#{pane_current_path}" "~/.zshrc.d/scripts/twigsmux.sh --prefix-current --run-wtct-on-create"
bind-key L switch-client -l
bind-key u attach-session -c "#{pane_current_path}"
bind-key r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"
bind-key n if-shell "tmux list-windows -t '#{session_id}' -F '##{window_name}' | grep -Fxq editor" {
    new-window -b -t '=editor' -c "#{pane_current_path}"
} {
    new-window -b -t '^' -c "#{pane_current_path}"
}
bind-key G rename-window git \;
bind-key Q rename-window query \;
bind-key E rename-window editor \;
bind-key g neww -S -n git -c "#{pane_current_path}" 'lazygit' \;
bind-key q neww -S -n query -c "#{pane_current_path}" \;
bind-key e neww -S -n editor -c "#{pane_current_path}" \;
bind-key a neww -S -n ai -c "#{pane_current_path}" \;
bind-key O run-shell "~/.zshrc.d/scripts/tmux-workspace.sh scaffold '#{client_tty}' '#{pane_id}'"

# Ctrl+b `: agentscan popup picker for tmux agent panes (tmux >= 3.2)
bind-key ` if-shell -F '#{>=:#{version},3.2}' { display-popup -E -x R -y 0 -w 65% -h 20 "$HOME/.zshrc.d/scripts/agentscan-popup.sh" }

# F4 enters an agentscan-only key table. This does not affect the normal prefix
# table used by Ctrl+b.
bind-key -n F4 switch-client -T agentscan
bind-key -T agentscan 1 run-shell "$HOME/.zshrc.d/scripts/agentscan.sh hotkey 1 --client-tty '#{client_tty}'"
bind-key -T agentscan 2 run-shell "$HOME/.zshrc.d/scripts/agentscan.sh hotkey 2 --client-tty '#{client_tty}'"
bind-key -T agentscan 3 run-shell "$HOME/.zshrc.d/scripts/agentscan.sh hotkey 3 --client-tty '#{client_tty}'"
bind-key -T agentscan 4 run-shell "$HOME/.zshrc.d/scripts/agentscan.sh hotkey 4 --client-tty '#{client_tty}'"
bind-key -T agentscan 5 run-shell "$HOME/.zshrc.d/scripts/agentscan.sh hotkey 5 --client-tty '#{client_tty}'"
bind-key -T agentscan q run-shell "$HOME/.zshrc.d/scripts/agentscan.sh hotkey q --client-tty '#{client_tty}'"
bind-key -T agentscan e run-shell "$HOME/.zshrc.d/scripts/agentscan.sh hotkey e --client-tty '#{client_tty}'"
bind-key -T agentscan r run-shell "$HOME/.zshrc.d/scripts/agentscan.sh hotkey r --client-tty '#{client_tty}'"
bind-key -T agentscan f run-shell "$HOME/.zshrc.d/scripts/agentscan.sh hotkey f --client-tty '#{client_tty}'"
bind-key -T agentscan g run-shell "$HOME/.zshrc.d/scripts/agentscan.sh hotkey g --client-tty '#{client_tty}'"
bind-key -T agentscan t run-shell "$HOME/.zshrc.d/scripts/agentscan.sh hotkey t --client-tty '#{client_tty}'"
bind-key -T agentscan z run-shell "$HOME/.zshrc.d/scripts/agentscan.sh hotkey z --client-tty '#{client_tty}'"
bind-key -T agentscan x run-shell "$HOME/.zshrc.d/scripts/agentscan.sh hotkey x --client-tty '#{client_tty}'"
bind-key -T agentscan c run-shell "$HOME/.zshrc.d/scripts/agentscan.sh hotkey c --client-tty '#{client_tty}'"
bind-key -T agentscan v run-shell "$HOME/.zshrc.d/scripts/agentscan.sh hotkey v --client-tty '#{client_tty}'"
bind-key -T agentscan b run-shell "$HOME/.zshrc.d/scripts/agentscan.sh hotkey b --client-tty '#{client_tty}'"
bind-key -T agentscan ` if-shell -F '#{>=:#{version},3.2}' { display-popup -E -x R -y 0 -w 65% -h 20 "$HOME/.zshrc.d/scripts/agentscan-popup.sh" }
bind-key -T agentscan Escape switch-client -T root
bind-key -T agentscan Any switch-client -T root
# Resolve tprompt via the wrapper so tmux does not depend on the server PATH.
# run-shell expands tmux formats before display-popup runs; quote session_id so
# ids like "$4" survive the outer shell and reach tprompt without a backslash.
bind-key p run-shell "tmux display-popup -E \"$HOME/.zshrc.d/scripts/tprompt-popup.sh --target-pane '#{pane_id}' --client-tty '#{client_tty}' --session-id '#{q:session_id}'\""

bind-key v split-window -h -c "#{pane_current_path}"
bind-key S split-window -v -c "#{pane_current_path}"

bind-key j previous-window
bind-key k next-window

if-shell 'test -n "$HOMEBREW_PREFIX" && test -x "$HOMEBREW_PREFIX/opt/tpm/share/tpm/tpm"' 'run-shell "$HOMEBREW_PREFIX/opt/tpm/share/tpm/tpm"'

set -g status on
set -g status-style "bg=#1A1B26"
set -g status-left-length 40
set -g status-left '#[fg=#2A2F41,bg=#7aa2f7,bold] #{?client_prefix,󰠠 ,#[dim]󰤂 }#[bold,nodim]#S '
